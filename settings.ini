[Monitor]
# 選擇權資料開始訂閱/收集的時間點 (格式 HH:MM:SS)
# 在這時間點之前只會收集大盤指數及期貨的資料。
trigger_time = 11:00:00

# 要訂閱的選擇權商品代碼 (修改此欄位即可切換監控目標)
#
# --- 週三到期 ---
# TX1  = 臺指選擇權 第1週週三到期
# TX2  = 臺指選擇權 第2週週三到期
# TXO  = 臺指選擇權 月選 (第3週週三到期)
# TX4  = 臺指選擇權 第4週週三到期
# TX5  = 臺指選擇權 第5週週三到期 (有時無)
#
# --- 週五到期 ---
# TXU  = 臺指選擇權 第1週週五到期
# TXV  = 臺指選擇權 第2週週五到期
# TXX  = 臺指選擇權 第3週週五到期
# TXY  = 臺指選擇權 第4週週五到期
# TXZ  = 臺指選擇權 第5週週五到期 (有時無)
#
option_mode = TX1

# 決定價平 (ATM) 基準點的資料來源
# index: 以大盤加權指數 (TSE001) 計算
# futures: 以台指期 (TXFR1) 價格計算
atm_source = index

# 履約價的跳動級距
# 結算當周的週選 (TX1/TX2/TX4/TX5) 通常為 50 點
# 月選 (TXO) 非結算周為 100 點，結算當周為 50 點
strike_step = 50

# 要監控的履約價範圍 (單邊)。設定為 5 代表監控價平上下各 5 檔。
# 實際合約數 = (strike_range * 2 + 1) * 2 (Call + Put)
strike_range = 5

# 訂閱選擇權合約時，每檔之間的延遲 (秒，0=不延遲)
subscribe_delay = 0.1

# 系統心跳的更新頻率 (秒)
heartbeat_interval = 5
# 心跳 Redis Key 的存活時間 (TTL，秒)
# 只要程式正常運行會一直被延長。如果關閉則 key 清除，可用於偵測系統是否斷線。
heartbeat_ttl = 10

[Futures]
# 訂閱標的 (多個標的以逗號隔開)
# TXFR1: 台指期近月連續, TXFR2: 台指期次近月連續
targets = TXFR1,TXFR2

# 是否保存 Tick 細節到 Redis (List)
save_ticks = True
# Tick 清單的最大容量 (限長，避免記憶體溢出)
tick_limit = 500

# K線歷史長度限制 (限長，只保留最近 N 根)
k1_limit = 300
k5_limit = 300
